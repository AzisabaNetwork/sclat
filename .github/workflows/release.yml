name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version. ex: x.x.x, x.x.x-SNAPSHOT'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        java:
          - "11"
        os:
          - "ubuntu-latest"
        mc:
          - "1.14.4"
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: actions/setup-java@dded0888837ed1f317902acf8a20df0ad188d165 # v5.0.0
        with:
          distribution: "adopt"
          java-version: ${{ matrix.java }}

      - name: Cache .m2 directory
        uses: actions/cache@8b402f58fbc84540c8b491a91e594a4576fec3d7 # v5.0.2
        id: cache
        with:
          path: ~/.m2
          key: m2-${{ matrix.java }}-${{ matrix.mc }}-cache
          restore-keys: |
            m2-${{ matrix.java }}-${{ matrix.mc }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1

      - name: Setup BuildTools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget "https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar"
          java -jar BuildTools.jar --rev ${{ matrix.mc }}

      - name: Build
        run: ./gradlew build
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          path: build/libs/

      - name: Publish to azisaba repo
        run: ./gradlew publish
        env:
          VERSION: ${{ github.event.inputs.version }}
          REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
          REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}

      - name: Create release
        uses: softprops/action-gh-release@6cbd405e2c4e67a21c47fa9e383d020e4e28b836 # v2.3.3
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: build/libs/Sclat.jar
          generate_release_notes: true
