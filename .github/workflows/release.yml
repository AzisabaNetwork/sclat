name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Plugin version. ex: x.x.x, x.x.x-SNAPSHOT'
        required: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 3
    strategy:
      fail-fast: false
      matrix:
        java:
          - "11"
        os:
          - "ubuntu-latest"
        mc:
          - "1.14.4"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "adopt"
          java-version: ${{ matrix.java }}

      - name: Cache .m2 directory
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache
        with:
          path: ~/.m2
          key: m2-${{ matrix.java }}-${{ matrix.mc }}-cache
          restore-keys: |
            m2-${{ matrix.java }}-${{ matrix.mc }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Setup BuildTools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget "https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar"
          java -jar BuildTools.jar --rev ${{ matrix.mc }}

      - name: Build
        run: ./gradlew build
        env:
          VERSION: ${{ github.event.inputs.version }}

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          path: build/libs/

      - name: Publish to azisaba repo
        run: ./gradlew publish
        env:
          VERSION: ${{ github.event.inputs.version }}
          REPO_USERNAME: ${{ secrets.REPO_USERNAME }}
          REPO_PASSWORD: ${{ secrets.REPO_PASSWORD }}

      - name: Create release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ github.event.inputs.version }}
          files: build/libs/Sclat.jar
          generate_release_notes: true
