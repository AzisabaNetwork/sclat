name: Build

on:
  push:
    paths:
      - '**/*.java'
      - '**/*.kt'
      - '**/*.gradle'
      - '**/*.gradle.kts'
      - 'gradle/**'
      - 'resources/**'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build with Java ${{ matrix.java }} for Minecraft ${{ matrix.mc }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        java:
          - "11"
          - "17"
        os:
          - "ubuntu-latest"
        mc:
          - "1.14.4"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: "adopt"
          java-version: ${{ matrix.java }}

      - name: Cache .m2 directory
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        id: cache
        with:
          path: ~/.m2
          key: m2-${{ matrix.java }}-${{ matrix.mc }}-cache
          restore-keys: |
            m2-${{ matrix.java }}-${{ matrix.mc }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@f29f5a9d7b09a7c6b29859002d29d24e1674c884 # v5.0.1

      - name: Setup BuildTools
        if: steps.cache.outputs.cache-hit != 'true'
        run: |
          wget "https://hub.spigotmc.org/jenkins/job/BuildTools/lastSuccessfulBuild/artifact/target/BuildTools.jar"
          java -jar BuildTools.jar --rev ${{ matrix.mc }}

      - name: Build with Gradle
        run: ./gradlew build

      - name: Upload a Build Artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifact-${{ matrix.java }}-${{ matrix.mc }}
          path: build/libs/
